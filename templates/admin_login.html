<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin login — Summit Stakes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/summit.css') }}">
</head>
<body>
<div class="login-wrap" style="min-height:100vh;">
  <div class="login-card">
    <h1>Admin <span>login</span></h1>
    <div class="sub">Staff access only.</div>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-gold">Log in</button>
    </form>

    <div class="login-foot">
      <a href="{{ url_for('dashboard') }}">&larr; Back to site</a>
    </div>
  </div>
</div>
</body>
</html>
