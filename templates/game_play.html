{% extends "base.html" %}

{% block title %}{{ game.name }} — Summit Stakes{% endblock %}

{% block content %}
<div class="content">
  <div class="colmain" style="max-width:none;">
    <div class="crumb">
      <span class="back" onclick="history.back()">&larr;</span>
      {{ game.name }} &middot; live
    </div>
    <div style="position:relative; width:100%; padding-top:60%; border-radius:12px; overflow:hidden; background:#000;">
      <iframe
        src="{{ game_url }}"
        style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
    <div style="font-size:11px; color:var(--text-faint); margin-top:12px; text-align:center;">
      Powered by {{ game.provider }} &mdash; real-money session
    </div>
  </div>
</div>
{% endblock %}
